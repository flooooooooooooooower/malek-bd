<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملكتي ملك</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ffb3c1;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* خلفية متحركة */
        .bg-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2b0b1a 0%, #000 100%);
            z-index: -1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff4d6d, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .heart {
            font-size: 60px;
            color: var(--primary-color);
            filter: drop-shadow(0 0 10px var(--primary-color));
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .message {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #eee;
        }

        .btn-surprise {
            margin-top: 25px;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .btn-surprise:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.6);
        }

        canvas {
            position: absolute;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <canvas id="stars"></canvas>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>ميلاد سعيد مـلـك</h1>
        <p class="message">
            في هذا اليوم المميز، أردت أن أهديكِ شيئاً لا ينتهي بانتهاء اليوم.. كوداً يخلد اسمك في عالم البرمجة، تماماً كما هو مخلد في قلبي.
        </p>
        <button class="btn-surprise" onclick="startCelebration()">إضغطي هنا ✨</button>
    </div>

    <script>
        // تأثير النجوم المتساقطة
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = Array(100).fill().map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            velocity: Math.random() * 0.5
        }));

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                s.y += s.velocity;
                if (s.y > canvas.height) s.y = 0;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function startCelebration() {
            alert("كل عام وأنتِ بخير يا أغلى ملك في الكون! 🎂✨");
            // يمكنك إضافة رابط يوتيوب لموسيقى هادئة هنا
            window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank'); 
        }
    </script>
</body>
</html>
