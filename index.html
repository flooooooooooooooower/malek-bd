<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Malak 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle,#ffd1dc,#c1f0ff,#d8b4fe);
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  color:white;
}

/* intro */
#intro{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:10;
  animation: fadeOut 2s ease 3s forwards;
}

#intro h1{
  font-size:30px;
  animation: zoom 2s ease;
}

@keyframes zoom{
  from{transform:scale(0); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

@keyframes fadeOut{
  to{opacity:0; visibility:hidden;}
}

/* card */
.box{
  width:90%;
  max-width:420px;
  padding:30px;
  background:rgba(255,255,255,0.12);
  border-radius:25px;
  backdrop-filter: blur(15px);
  text-align:center;
  box-shadow:0 0 30px rgba(255,255,255,0.2);
  animation: float 3s ease-in-out infinite;
  z-index:2;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

h2{font-size:22px;}
p{font-size:15px; line-height:1.6;}

.step{display:none;}
.active{display:block;}

button{
  margin-top:15px;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:white;
  font-weight:600;
}

.heart{
  font-size:50px;
  animation: beat 1s infinite;
}

@keyframes beat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.3);}
}

/* typing */
#type{
  font-size:15px;
  min-height:60px;
}

/* music */
#musicBtn{
  position:absolute;
  top:15px;
  right:15px;
  border-radius:50%;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* confetti */
.confetti{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  animation: fall 3s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(360deg); opacity:0;}
}
</style>
</head>

<body>

<!-- intro cinematic -->
<div id="intro">
  <h1>💖 Loading something special for Malak...</h1>
</div>

<!-- music -->
<button id="musicBtn" onclick="toggleMusic()">🎵</button>
<audio id="music" loop autoplay>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="box">

  <div class="step active" id="s1">
    <h2>💭 Message</h2>
    <p>عندي حاجة خاصة ليك… ركز 💖</p>
    <button onclick="next(1)">Start</button>
  </div>

  <div class="step" id="s2">
    <h2>✨ Feeling</h2>
    <p>من نهار عرفتك، الدنيا ولات أجمل ✨</p>
    <button onclick="next(2)">Next</button>
  </div>

  <div class="step" id="s3">
    <h2>💫 Truth</h2>
    <p>قلبي ولا يرتاح غير بوجودك 💕</p>
    <button onclick="next(3)">Next</button>
  </div>

  <div class="step" id="s4">
    <h2>💖 Final</h2>
    <div id="type"></div>
    <button onclick="next(4)">Open 💌</button>
  </div>

  <div class="step" id="s5">
    <div class="heart">💖</div>
    <h2>Happy Birthday Malak 🎉</h2>
    <p>كل عام وأنتِ بخير 🌸<br>ربي يحفظك ويخلي الضحكة ديما معاك ✨</p>
  </div>

</div>

<script>

let msg = "Malak... you are not just a name, you are a feeling I never want to lose 💖";
let i = 0;

function typeWriter(){
  if(i < msg.length){
    document.getElementById("type").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeWriter,50);
  }
}

function next(n){
  document.getElementById("s"+n).classList.remove("active");
  document.getElementById("s"+(n+1)).classList.add("active<!DOCTYPE html>
